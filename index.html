        /* Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background-color: rgba(20, 20, 20, 0.95);
            margin: auto;
            padding: 40px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            width: 90%;
            max-width: 500px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            backdrop-filter: blur(10px);
            animation: slideUp 0.4s ease-out;
        }

        @keyframes slideUp {
            from {
                transform: translate(-50%, -30%);
                opacity: 0;
            }
            to {
                transform: translate(-50%, -50%);
                opacity: 1;
            }
        }

        .close-btn {
            position: absolute;
            right: 20px;
            top: 20px;
            font-size: 28px;
            font-weight: bold;
            color: #ffffff;
            cursor: pointer;
            transition: color 0.3s;
        }

        .close-btn:hover {
            color: #ff0000;
        }

        .modal-btn {
            padding: 12px 28px;
            margin-top: 20px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 50px;
            background: transparent;
            color: #ffffff;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .modal-btn:hover {
            background: #ff0000;
            border-color: #ff0000;
        }

        /* Responsive */
        @media (max-width: 768px) {
            section {
                padding: 40px 20px;
            }

            .threat-title,
            .menace-title,
            .section-title,
            .about-title {
                font-size: 36px;
            }

            .threat-cards,
            .menace-cards,
            .members-grid {
                grid-template-columns: 1fr;
            }

            .about-content {
                grid-template-columns: 1fr;
                gap: 30px;
            }

            .about-image {
                height: 300px;
            }
        }

        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fade-in {
            animation: fadeInUp 0.6s ease-out forwards;
        }
